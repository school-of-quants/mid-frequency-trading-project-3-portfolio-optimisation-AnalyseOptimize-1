train_start_date: "2017-01-01"
train_end_date: "2021-12-31"
backtest_start_date: "2022-01-01"
backtest_end_date: "2025-12-31"

init_cash: 20000000
fees: 0.001

data:
  min_ticker_coverage: 0.9
  coverage_field: "Close"
  force_reload: false

labeling:
  pt_sl: [1, 1]
  vertical_barrier_days: 10
  target_return: 0.05
  use_volatility_target: true
  rolling_n: 50
  scaling_factor: 2.0

model:
  iterations: 1000
  learning_rate: 0.05
  depth: 6
  random_seed: 42
  cv_splits: 5
  embargo_days: 10
  verbose: false
  meta_labeling:
    enabled: true

backtest:
  cv_splits: 6
  cv_test_splits: 2
  benchmark_ticker: "SPY"
  benchmark_metrics: true

portfolio:
  min_signal: 0.02
  top_n: 50
  max_weight: 0.05
  risk_scale: true
  volatility_window: 22
  rebalance_frequency: "W-FRI"
